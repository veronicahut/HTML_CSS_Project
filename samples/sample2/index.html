<!DOCTYPE html>
<html lang="en">

        name: index.html

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environmental Trivia Game</title>
    <link rel="stylesheet" href="styles/styles.css"> 
</head>

<body>
    <main class="trivia-container">
        <h1>Welcome to 2-Minute Environmental Trivia!</h1>

        <p id="question">Loading trivia question...</p>

        <p id="feedback-message" class="response"></p>

        <p id="fact" class="response"></p>

        <div class="btn-grid">
            <button id="true-answer" class="btn">True</button>
            <button id="false-answer" class="btn">False</button>
        </div>
        
        <div class="next-btn">
            <button id="next-btn" class="btn big">Next Question</button>
        </div>
        <br>
        <div class="timer">Time Remaining: <span id="timer"></span> </div>
        <br>
        <div class="score">Trivia Score: <span id="points">0</span></div>
        <br>
        <br>
        <nav>
            <ul>
                <li><a href="../../techSamples.html">Return to Samples Page</a></li>
            </ul>
        </nav>
    </main>
    
    <script src="scripts/environmental_trivia.js"></script>
</body>
</html>
